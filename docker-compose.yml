services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: foxtel
    volumes:
      - foxtel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d foxtel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - foxtel_redisdata:/data

  redisinsight:
    image: redis/redisinsight:latest
    restart: unless-stopped
    ports:
      - "8001:5540"
    volumes:
      - foxtel_redisinsight:/data

volumes:
  foxtel_pgdata:
  foxtel_redisdata:
  foxtel_redisinsight: